<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Chroniques du QG</title>
    <style>
        :root { --p1: #2980b9; --p2: #c0392b; --trap: #d1b3ff; --wall: #2c3e50; }
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        #ui-layer { width: 100%; max-width: 600px; padding: 10px; text-align: center; background: #222; border-bottom: 2px solid #444; }
        #board { 
            display: grid; grid-template-columns: repeat(8, 1fr); 
            width: 95vw; height: 95vw; max-width: 500px; max-height: 500px;
            border: 5px solid #333; background: #444; gap: 2px; margin: 20px 0;
        }
        .cell { background: #555; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; min-height: 40px; }
        .cell:nth-child(even) { background: #4d4d4d; }
        .cell.is-trap { background: var(--trap) !important; }
        .cell.is-wall { background: var(--wall) !important; border: 1px solid black; }
        
        .piece { 
            width: 85%; height: 85%; border-radius: 8px; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            font-weight: bold; font-size: 0.6em; color: white; border: 1px solid #fff;
        }
        .p1 { background: var(--p1); }
        .p2 { background: var(--p2); }
        .selected { border: 3px solid yellow !important; transform: scale(1.1); }
        .hp { font-size: 0.8em; opacity: 0.9; }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px 15px; border: none; border-radius: 5px; background: #8e44ad; color: white; cursor: pointer; font-weight: bold; }
        
        #modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <h2 id="status">Chargement...</h2>
    <div>Murs: <span id="walls">5</span> | IA: <span id="ia-lvl">1</span></div>
</div>

<div id="board"></div>

<div class="controls">
    <button onclick="setMode('move')">DÉPLACER</button>
    <button onclick="setMode('wall')">POSER MUR</button>
</div>

<div id="modal">
    <h1 id="modal-title"></h1>
    <button onclick="location.reload()" style="padding:15px; font-size:1.2em;">REJOUER</button>
</div>

<script>
let mode = "place_traps";
let wallsLeft = 5;
let trapsLeft = 5;
let selectedIdx = null;
let board = Array(64).fill(null);

const UNITS = {
    ROI: { n: 'ROI', hp: 500, atk: 150 },
    SOL: { n: 'SOLDAT', hp: 165, atk: 30 },
    PAL: { n: 'PALADIN', hp: 200, atk: 50 },
    GLA: { n: 'GLADIA', hp: 180, atk: 70 },
    MAG: { n: 'MAGE', hp: 100, atk: 90 },
    QG:  { n: 'QG', hp: 300, atk: 0 }
};

function init() {
    const grid = document.getElementById('board');
    grid.innerHTML = '';
    for(let i=0; i<64; i++) {
        let c = document.createElement('div');
        c.className = 'cell';
        c.id = 'c' + i;
        c.onclick = () => clickCell(i);
        grid.appendChild(c);
    }
    setupGame();
    render();
}

function setupGame() {
    // JOUEUR (Bleu)
    place(60, 'ROI', 'p1'); place(56, 'QG', 'p1');
    [48, 49, 50, 51, 52].forEach(i => place(i, 'SOL', 'p1'));
    place(57, 'PAL', 'p1'); place(58, 'PAL', 'p1');
    place(61, 'GLA', 'p1'); place(62, 'GLA', 'p1');
    place(59, 'MAG', 'p1');

    // IA (Rouge)
    place(3, 'ROI', 'p2'); place(7, 'QG', 'p2');
    [8, 9, 10, 11, 12].forEach(i => place(i, 'SOL', 'p2'));
    place(1, 'PAL', 'p2'); place(2, 'PAL', 'p2');
    place(5, 'GLA', 'p2'); place(6, 'GLA', 'p2');
    place(4, 'MAG', 'p2');

    document.getElementById('status').innerText = "Placez vos 5 pièges violets";
}

function place(i, type, owner) {
    board[i] = { ...UNITS[type], owner, curHp: UNITS[type].hp };
}

function clickCell(i) {
    if(mode === "place_traps") {
        const cell = document.getElementById('c'+i);
        if(!board[i] && !cell.classList.contains('is-trap')) {
            cell.classList.add('is-trap');
            trapsLeft--;
            if(trapsLeft <= 0) { mode = "move"; document.getElementById('status').innerText = "À vous !"; }
            else { document.getElementById('status').innerText = `Pièges: ${trapsLeft}`; }
        }
        return;
    }

    if(mode === "wall") {
        if(!board[i] && wallsLeft > 0) {
            board[i] = { type: 'WALL' };
            wallsLeft--;
            document.getElementById('walls').innerText = wallsLeft;
            render();
            setTimeout(iaTurn, 500);
        }
        return;
    }

    if(board[i] && board[i].owner === 'p1') {
        selectedIdx = i;
    } else if(selectedIdx !== null) {
        processAction(selectedIdx, i);
        selectedIdx = null;
    }
    render();
}

function processAction(from, to) {
    const p = board[from];
    const target = board[to];

    if(target && target.owner === 'p2') {
        target.curHp -= p.atk;
        if(target.curHp <= 0) {
            if(target.n === 'ROI') return showWin("VICTOIRE !");
            board[to] = null;
        }
        setTimeout(iaTurn, 500);
    } else if(!target) {
        board[to] = board[from];
        board[from] = null;
        if(document.getElementById('c'+to).classList.contains('is-trap')) {
            board[to].curHp -= 60;
            if(board[to].curHp <= 0) board[to] = null;
        }
        setTimeout(iaTurn, 500);
    }
}

function iaTurn() {
    let p2Units = [];
    board.forEach((p, i) => { if(p && p.owner === 'p2' && p.n !== 'QG') p2Units.push(i); });
    if(p2Units.length > 0) {
        let idx = p2Units[Math.floor(Math.random() * p2Units.length)];
        if(idx + 8 < 64 && !board[idx+8]) {
            board[idx+8] = board[idx];
            board[idx] = null;
        }
    }
    render();
}

function render() {
    for(let i=0; i<64; i++) {
        const c = document.getElementById('c' + i);
        c.innerHTML = '';
        const p = board[i];
        if(p) {
            if(p.type === 'WALL') {
                c.classList.add('is-wall');
            } else {
                let d = document.createElement('div');
                d.className = `piece ${p.owner} ${i === selectedIdx ? 'selected' : ''}`;
                d.innerHTML = `<div>${p.n}</div><div class="hp">${p.curHp}</div>`;
                c.appendChild(d);
            }
        }
    }
}

function showWin(t) {
    document.getElementById('modal-title').innerText = t;
    document.getElementById('modal').style.display = 'flex';
}

function setMode(m) { mode = m; }

// On lance le jeu dès que la page est chargée
window.onload = init;
</script>
</body>
</html>
